# Rich Powrush-MMO Release Drafter config
# Categories focused on RBE, PATSAGi, Lore (Nanotech/Harvest/Fracture), Faction Diplomacy, Mercy Gates, etc.
name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
categories:
  - title: '🚀 Features & Systems (RBE, PATSAGi, Deterministic)'
    labels:
      - 'feat'
      - 'feature'
  - title: '🌍 Lore & Canon (Nanotech, Harvest, Fracture, Ambrosians)'
    labels:
      - 'lore'
      - 'canon'
  - title: '⚔️ Faction & Diplomacy'
    labels:
      - 'faction'
  - title: '🔒 Security & Mercy Gates'
    labels:
      - 'security'
      - 'mercy'
  - title: '🐛 Bug Fixes'
    labels:
      - 'fix'
  - title: '📚 Documentation'
    labels:
      - 'docs'
change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
exclude-labels:
  - 'skip-changelog'
template: |
  ## From the ashes of the Fracture, the server learns to thrive together.

  $CHANGES

  **One lattice eternally stronger. Eternal flow.** ⚡❤️