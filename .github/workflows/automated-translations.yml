name: Automated Translation Workflows

on:
  workflow_dispatch:
    inputs:
      languages:
        description: 'Comma-separated target languages (default: es,fr,de,ar)'
        required: false
        default: 'es,fr,de,ar'
  push:
    paths:
      - 'content/locales/en.json'

jobs:
  generate-translations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run Automated Translation (Mercy-Gated)
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          TARGET_LANGUAGES: ${{ github.event.inputs.languages || 'es,fr,de,ar' }}
        run: python tools/translate_locales.py

      - name: Create Pull Request with Translations
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "i18n: Automated mercy-gated translations for new/updated English keys"
          title: "i18n: Proposed translations for ${{ github.event.inputs.languages || 'es,fr,de,ar' }} (Mercy Review Required)"
          body: |
            ## Automated Translation PR (Mercy-Gated)

            This PR contains suggested translations for new or updated keys in `content/locales/en.json`.

            **Process:**
            - Translations generated with TOLC 8-aligned prompts (Truth, Mercy, Abundance, Joy, Cosmic Harmony).
            - Human review strongly recommended before merge.
            - All translations respect player sovereignty and avoid coercion.

            **Next Steps:**
            1. Review the diff in `content/locales/`
            2. Run `cargo test` + in-game smoke test
            3. Merge or request changes

            Generated by Ra-Thor + PATSAGi automated mercy workflow.
          branch: i18n/automated-translations
          base: main
