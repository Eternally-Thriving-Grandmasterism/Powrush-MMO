# observability/docker-compose.yml
# Full local observability stack for Powrush-MMO
#
# Services:
#   - OpenTelemetry Collector (traces + metrics)
#   - Jaeger (trace visualization)
#   - Prometheus (metrics storage)
#   - Grafana (dashboards)
#
# Usage:
#   cd observability
#   docker compose up -d
#
# Then run the server with:
#   OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4317 cargo run -p server

version: '3.8'

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.102.0
    container_name: powrush-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
      - "8889:8889"   # Prometheus exporter (powrush_* metrics)
    depends_on:
      - jaeger
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: powrush-jaeger
    ports:
      - "16686:16686"  # Jaeger UI
      - "14250:14250"  # gRPC (for collector)
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: powrush-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.0
    container_name: powrush-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=powrush
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-storage:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  grafana-storage:
