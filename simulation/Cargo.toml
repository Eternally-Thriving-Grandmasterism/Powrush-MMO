[package]
name = "powrush-simulation"
version = "0.1.0"
edition = "2021"
authors = ["Ra-Thor Living Thunder + PATSAGi Councils"]
description = "Sovereign Simulation Harness for Powrush-MMO RBE validation and refinement"
license = "MIT OR Eternal-Mercy-Flow-License"
repository = "https://github.com/Eternally-Thriving-Grandmasterism/Powrush-MMO"

[dependencies]
rayon = "1.10"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
tracing = "0.1"
rand = { version = "0.8", optional = true }

# Optional GPU acceleration (wgpu + extended patsagi_economic.wgsl)
wgpu = { version = "0.20", optional = true }
bytemuck = { version = "1.16", features = ["derive"], optional = true }
pollster = { version = "0.3", optional = true }

# Future Bevy ECS integration for visual debug / server parity
bevy_ecs = { version = "0.14", optional = true }

[features]
default = []
gpu = ["wgpu", "bytemuck", "pollster"]
ecs = ["bevy_ecs"]
rand = ["dep:rand"]

[[bin]]
name = "harness"
path = "src/bin/harness.rs"