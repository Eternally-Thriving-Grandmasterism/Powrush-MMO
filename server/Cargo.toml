[package]
name = "powrush-server"
version = "16.7.5"
edition = "2021"

[dependencies]
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = "0.3"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio-util = { version = "0.7", features = ["rt"] }
surrealdb = { version = "2", features = ["kv-rocksdb"] }
shared = { path = "../shared" }
