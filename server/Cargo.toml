[package]
name = "powrush-server"
version = "17.0.0"
edition = "2021"

[dependencies]
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = "0.3"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
bincode = { version = "1.3", features = ["serde"] }
tokio-util = { version = "0.7", features = ["rt"] }
shared = { path = "../shared" }
powrush-divine-module = { path = "../powrush-divine-module" }

# Professional PostgreSQL persistence (primary for production MMO)
sqlx = { version = "0.8", features = ["runtime-tokio-rustls", "postgres", "chrono", "uuid", "json"] }
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4", "serde"] }

# Optional: keep for dev/testing fallback (can be feature-gated later)
# surrealdb = { version = "2", features = ["kv-rocksdb"] }  # commented for clean Postgres focus
