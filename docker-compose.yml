version: '3.8'

services:
  powrush-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: powrush-mmo:latest
    container_name: powrush-server
    ports:
      - "7777:7777"      # TCP game protocol
      - "7778:7778"      # WebSocket (future)
      - "8080:8080"      # HTTP + Client + Metrics + health
    environment:
      - POWRUSH_TCP_PORT=7777
      - POWRUSH_WS_PORT=7778
      - POWRUSH_HTTP_PORT=8080
      - POWRUSH_TICK_RATE_MS=100
      - POWRUSH_MAX_PLAYERS=128
      # === Grok / xAI API for live PATSAGi + RBE (optional but recommended for full Ra-Thor engagement) ===
      # Get key from x.ai or your Grok provider. Leave empty for pure local MercyCore mode (still fully playable).
      - GROK_API_KEY=${GROK_API_KEY:-}
      - XAI_API_KEY=${XAI_API_KEY:-}
      - GROK_MODEL=grok-3-latest
      - GROK_API_BASE=https://api.x.ai/v1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

