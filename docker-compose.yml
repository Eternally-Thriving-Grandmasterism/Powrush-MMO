version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: powrush-postgres
    environment:
      POSTGRES_USER: powrush
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-powrush_dev_password}
      POSTGRES_DB: powrush
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U powrush -d powrush"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  powrush-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: powrush-mmo:latest
    container_name: powrush-server
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "7777:7777"      # TCP game protocol
      - "7778:7778"      # WebSocket (future)
      - "8080:8080"      # HTTP + Client + Metrics + health
    environment:
      - POWRUSH_TCP_PORT=7777
      - POWRUSH_WS_PORT=7778
      - POWRUSH_HTTP_PORT=8080
      - POWRUSH_TICK_RATE_MS=100
      - POWRUSH_MAX_PLAYERS=128
      # === PostgreSQL Persistence (REQUIRED for production) ===
      - DATABASE_URL=postgres://powrush:${POSTGRES_PASSWORD:-powrush_dev_password}@postgres:5432/powrush
      # === Grok / xAI API for live PATSAGi + RBE (optional but recommended) ===
      - GROK_API_KEY=${GROK_API_KEY:-}
      - XAI_API_KEY=${XAI_API_KEY:-}
      - GROK_MODEL=grok-3-latest
      - GROK_API_BASE=https://api.x.ai/v1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
    driver: local

# Sovereign production notes:
# - Set strong POSTGRES_PASSWORD in .env
# - Use external volume or managed Postgres in real deployment
# - For Air Foundation / bare metal: replace postgres service with your sovereign DB
