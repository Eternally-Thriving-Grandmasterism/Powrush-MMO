[package]
name = "powrush-mmo"
version = "0.1.0"
edition = "2021"

[workspace]
members = ["client", "server", "simulation", "shared"]

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
panic = "abort"

[profile.release.package."powrush-mmo-server"]
opt-level = 3
lto = true
strip = true
codegen-units = 1
