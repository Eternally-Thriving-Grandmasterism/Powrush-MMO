[package]
name = "powrush-mmo"
version = "0.1.0"
edition = "2021"

[workspace]
members = ["server", "shared"]

[dependencies]

[dev-dependencies]
steamworks = "0.13"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
criterion = { version = "0.5", features = ["html_reports"] }

[[bench]]
name = "harvest_flow_bench"
harness = false

[[example]]
name = "steam_settings_client"
path = "examples/steam_settings_client.rs"