[package]
name = "powrush-mmo"
version = "0.1.0"
edition = "2021"

[workspace]
members = ["client", "server", "simulation", "shared"]

[profile.release]
opt-level = 3          # Maximum optimizations
lto = true             # Link-time optimization
codegen-units = 1      # Better optimization at cost of compile time
strip = true           # Remove debug symbols (strong obfuscation benefit)
panic = "abort"        # Smaller binary, slightly faster
overflow-checks = false

[profile.release.package."powrush-mmo-client"]
opt-level = 3
lto = true
strip = true

[dependencies]
# Lightweight string obfuscation for sensitive values
obfstr = "0.4"
