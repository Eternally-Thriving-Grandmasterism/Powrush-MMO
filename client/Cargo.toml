[package]
name = "powrush-client"
version = "0.1.0"
edition = "2021"

[features]
default = ["native"]
native = ["tokio-tungstenite", "tungstenite"]
wasm = [
    "web-sys",
    "wasm-bindgen",
    "wasm-bindgen-futures",
    "js-sys",
    "bevy/webgl2"
]

[dependencies]
bevy = { version = "0.14", default-features = false, features = ["bevy_asset", "bevy_winit", "bevy_render", "bevy_core_pipeline", "bevy_pbr", "bevy_scene", "bevy_gltf", "bevy_text", "bevy_ui", "bevy_sprite", "png", "hdr", "x11", "wayland"] }
bevy_hanabi = "0.14"

# Native WebSocket (optional for native feature)
tokio-tungstenite = { version = "0.23", optional = true }
tungstenite = { version = "0.23", optional = true }

futures-util = "0.3"
serde = { version = "1.0", features = ["derive"] }
bincode = "1.3"
snappy = "0.3"
tracing = "0.1"
anyhow = "1.0"
powrush-divine-module = { path = "../powrush-divine-module" }
shared = { path = "../shared" }

# WASM / Browser dependencies (optional for wasm feature)
web-sys = { version = "0.3", features = ["WebSocket", "MessageEvent", "BinaryType", "ErrorEvent", "CloseEvent"], optional = true }
wasm-bindgen = { version = "0.2", optional = true }
wasm-bindgen-futures = { version = "0.4", optional = true }
js-sys = { version = "0.3", optional = true }

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"

[target.'cfg(target_arch = "wasm32")'.dependencies]
getrandom = { version = "0.2", features = ["js"] }