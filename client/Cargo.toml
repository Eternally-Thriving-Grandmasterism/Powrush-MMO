[package]
name = "powrush-client"
version = "17.0.0"
edition = "2021"

[dependencies]
bevy = { version = "0.14", features = ["dynamic_linking"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
shared = { path = "../shared" }
powrush-divine-module = { path = "../powrush-divine-module", features = ["client"] }
rubato = "0.15"
web-sys = { version = "0.3", features = ["Window", "Storage"] }
